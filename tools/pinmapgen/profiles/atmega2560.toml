# ATmega2560 — Microchip ATmega2560 (Arduino Mega 2560)
# Canonical pin names: PA0-PA7, PB0-PB7, PC0-PC7, PD0-PD7, PE0-PE7,
#                      PF0-PF7, PG0-PG5, PH0-PH7, PJ0-PJ7, PK0-PK7, PL0-PL7

[profile]
schema_version = 1
name           = "atmega2560"
display_name = "ATmega2560"
description  = "Microchip ATmega2560 8-bit AVR (Arduino Mega 2560)"
family       = "avr"

# ── Normalization ──────────────────────────────────────────────────────────

[normalization]
canonical_prefix = "P"
allow_numeric    = false

[[normalization.patterns]]
regex  = "GPIO([A-Z])(\\d+)"
output = "P{0}{1}"

[[normalization.patterns]]
regex  = "([A-Z])(\\d+)"
output = "P{0}{1}"

# Arduino Mega digital pin aliases (most common ones)
[normalization.aliases]
D0  = "PE0"
D1  = "PE1"
D2  = "PE4"
D3  = "PE5"
D4  = "PG5"
D5  = "PE3"
D6  = "PH3"
D7  = "PH4"
D8  = "PH5"
D9  = "PH6"
D10 = "PB4"
D11 = "PB5"
D12 = "PB6"
D13 = "PB7"
A0  = "PF0"
A1  = "PF1"
A2  = "PF2"
A3  = "PF3"
A4  = "PF4"
A5  = "PF5"
A6  = "PF6"
A7  = "PF7"
A8  = "PK0"
A9  = "PK1"
A10 = "PK2"
A11 = "PK3"
A12 = "PK4"
A13 = "PK5"
A14 = "PK6"
A15 = "PK7"

# ── Pin groups ────────────────────────────────────────────────────────────

[[pins.groups]]
range = { prefix = "PA", start = 0, end = 7 }
capabilities = ["gpio"]

[[pins.groups]]
range = { prefix = "PB", start = 0, end = 7 }
capabilities = ["gpio"]

[[pins.groups]]
range = { prefix = "PC", start = 0, end = 7 }
capabilities = ["gpio"]

[[pins.groups]]
range = { prefix = "PD", start = 0, end = 7 }
capabilities = ["gpio"]

[[pins.groups]]
range = { prefix = "PE", start = 0, end = 7 }
capabilities = ["gpio"]

[[pins.groups]]
range = { prefix = "PF", start = 0, end = 7 }
capabilities = ["gpio"]

[[pins.groups]]
names = ["PG0", "PG1", "PG2", "PG3", "PG4", "PG5"]
capabilities = ["gpio"]

[[pins.groups]]
range = { prefix = "PH", start = 0, end = 7 }
capabilities = ["gpio"]

[[pins.groups]]
range = { prefix = "PJ", start = 0, end = 7 }
capabilities = ["gpio"]

[[pins.groups]]
range = { prefix = "PK", start = 0, end = 7 }
capabilities = ["gpio"]

[[pins.groups]]
range = { prefix = "PL", start = 0, end = 7 }
capabilities = ["gpio"]

