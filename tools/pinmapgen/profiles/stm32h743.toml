# STM32H743 — ST STM32H743 Cortex-M7 high-performance MCU (LQFP-100)
# Canonical pin names: PA0–PA15, PB0–PB15, PC0–PC15, PD0–PD15, PE0–PE15

[profile]
schema_version = 1
name           = "stm32h743"
display_name = "STM32H743"
description  = "ST STM32H743 ARM Cortex-M7 480 MHz (LQFP-100)"
family       = "stm32"

# ── Normalization ──────────────────────────────────────────────────────────

[normalization]
canonical_prefix = "P"
allow_numeric    = false

[[normalization.patterns]]
regex  = "GPIO([A-Z])(\\d+)"
output = "P{0}{1}"

[[normalization.patterns]]
regex  = "([A-Z])(\\d+)"
output = "P{0}{1}"

[normalization.aliases]
SWDIO    = "PA13"
SWCLK    = "PA14"
TRACESWO = "PB3"

# ── Pin groups ────────────────────────────────────────────────────────────

[[pins.groups]]
range        = { prefix = "PA", start = 0, end = 15 }
capabilities = ["gpio"]

[[pins.groups]]
range        = { prefix = "PB", start = 0, end = 15 }
capabilities = ["gpio"]

[[pins.groups]]
range        = { prefix = "PC", start = 0, end = 15 }
capabilities = ["gpio"]

[[pins.groups]]
range        = { prefix = "PD", start = 0, end = 15 }
capabilities = ["gpio"]

[[pins.groups]]
range        = { prefix = "PE", start = 0, end = 15 }
capabilities = ["gpio"]

# ── Per-pin capabilities ─────────────────────────────────────────────────

# ADC1/2/3 (PA0-PA7, PB0-PB1, PC0-PC5)
[[pins.individual]]
name = "PA0"
add_capabilities = ["adc", "pwm", "uart_tx"]
[[pins.individual]]
name = "PA1"
add_capabilities = ["adc", "pwm"]
[[pins.individual]]
name = "PA2"
add_capabilities = ["adc", "pwm", "uart_tx"]
[[pins.individual]]
name = "PA3"
add_capabilities = ["adc", "pwm", "uart_rx"]
[[pins.individual]]
name = "PA4"
add_capabilities = ["adc", "dac", "spi_cs"]
[[pins.individual]]
name = "PA5"
add_capabilities = ["adc", "dac", "spi_sck"]
[[pins.individual]]
name = "PA6"
add_capabilities = ["adc", "pwm", "spi_miso"]
[[pins.individual]]
name = "PA7"
add_capabilities = ["adc", "pwm", "spi_mosi"]

# I2C / UART
[[pins.individual]]
name = "PA8"
add_capabilities = ["pwm"]
[[pins.individual]]
name = "PA9"
add_capabilities = ["pwm", "uart_tx", "i2c_scl"]
[[pins.individual]]
name = "PA10"
add_capabilities = ["pwm", "uart_rx", "i2c_sda"]
[[pins.individual]]
name = "PA11"
add_capabilities = ["pwm", "usb_dm", "can_rx"]
special_function       = "USB FS D-"
special_function_short = "USB D-"
[[pins.individual]]
name = "PA12"
add_capabilities = ["usb_dp", "can_tx"]
special_function       = "USB FS D+"
special_function_short = "USB D+"

# SWD
[[pins.individual]]
name = "PA13"
special_function       = "SWD Debug IO (SWDIO)"
special_function_short = "SWDIO"
warnings               = ["PA13 is default SWDIO"]
[[pins.individual]]
name = "PA14"
special_function       = "SWD Debug Clock (SWCLK)"
special_function_short = "SWCLK"
warnings               = ["PA14 is default SWCLK"]

# Port B highlights
[[pins.individual]]
name = "PB0"
add_capabilities = ["adc", "pwm"]
[[pins.individual]]
name = "PB1"
add_capabilities = ["adc", "pwm"]
[[pins.individual]]
name = "PB3"
add_capabilities = ["spi_sck"]
special_function       = "SWO (Trace)"
special_function_short = "SWO"
[[pins.individual]]
name = "PB4"
add_capabilities = ["spi_miso"]
[[pins.individual]]
name = "PB5"
add_capabilities = ["spi_mosi"]
[[pins.individual]]
name = "PB6"
add_capabilities = ["pwm", "i2c_scl", "uart_tx"]
[[pins.individual]]
name = "PB7"
add_capabilities = ["pwm", "i2c_sda", "uart_rx"]
[[pins.individual]]
name = "PB8"
add_capabilities = ["pwm", "i2c_scl", "can_rx"]
[[pins.individual]]
name = "PB9"
add_capabilities = ["pwm", "i2c_sda", "can_tx"]
[[pins.individual]]
name = "PB10"
add_capabilities = ["pwm", "i2c_scl"]
[[pins.individual]]
name = "PB11"
add_capabilities = ["pwm", "i2c_sda"]

# Port C (ADC3 + SDMMC)
[[pins.individual]]
name = "PC0"
add_capabilities = ["adc"]
[[pins.individual]]
name = "PC1"
add_capabilities = ["adc"]
[[pins.individual]]
name = "PC2"
add_capabilities = ["adc", "spi_miso"]
[[pins.individual]]
name = "PC3"
add_capabilities = ["adc", "spi_mosi"]
[[pins.individual]]
name = "PC4"
add_capabilities = ["adc"]
[[pins.individual]]
name = "PC5"
add_capabilities = ["adc"]
[[pins.individual]]
name = "PC6"
add_capabilities = ["pwm", "uart_tx"]
[[pins.individual]]
name = "PC7"
add_capabilities = ["pwm", "uart_rx"]
[[pins.individual]]
name = "PC10"
add_capabilities = ["uart_tx", "spi_sck"]
[[pins.individual]]
name = "PC11"
add_capabilities = ["uart_rx", "spi_miso"]
[[pins.individual]]
name = "PC14"
special_function       = "LSE Crystal (32 kHz)"
special_function_short = "LSE"
[[pins.individual]]
name = "PC15"
special_function       = "LSE Crystal (32 kHz)"
special_function_short = "LSE"

# ── Peripherals ───────────────────────────────────────────────────────────

[[peripherals]]
name = "I2C"
instance = 0
pins = { sda = "PB7", scl = "PB6" }

[[peripherals]]
name = "I2C"
instance = 1
pins = { sda = "PB11", scl = "PB10" }

[[peripherals]]
name = "SPI"
instance = 0
pins = { mosi = "PA7", miso = "PA6", sck = "PA5", cs = "PA4" }

[[peripherals]]
name = "SPI"
instance = 1
pins = { mosi = "PC3", miso = "PC2", sck = "PB10" }

[[peripherals]]
name = "UART"
instance = 0
pins = { tx = "PA9", rx = "PA10" }

[[peripherals]]
name = "UART"
instance = 1
pins = { tx = "PA2", rx = "PA3" }

[[peripherals]]
name = "UART"
instance = 2
pins = { tx = "PC6", rx = "PC7" }

[[peripherals]]
name = "CAN"
instance = 0
pins = { tx = "PB9", rx = "PB8" }

[[peripherals]]
name = "USB"
instance = 0
pins = { dp = "PA12", dm = "PA11" }

[[peripherals]]
name = "DAC"
instance = 0
pins = { ch0 = "PA4", ch1 = "PA5" }
