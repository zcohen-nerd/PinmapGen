# RP2350 — Raspberry Pi RP2350 dual-core Cortex-M33 / Hazard3 RISC-V
# Canonical pin names: GP0 – GP47

[profile]
schema_version = 1
name           = "rp2350"
display_name = "RP2350"
description  = "Raspberry Pi RP2350 dual-core Cortex-M33 / RISC-V (QFN-60)"
family       = "rp2"

# ── Normalization ──────────────────────────────────────────────────────────

[normalization]
canonical_prefix = "GP"
allow_numeric    = true

[[normalization.patterns]]
regex  = "GPIO(\\d+)"
output = "GP{0}"

[[normalization.patterns]]
regex  = "IO(\\d+)"
output = "GP{0}"

[normalization.aliases]
ADC0 = "GP40"
ADC1 = "GP41"
ADC2 = "GP42"
ADC3 = "GP43"
ADC4 = "GP44"
ADC5 = "GP45"
ADC6 = "GP46"
ADC7 = "GP47"

# ── Pin definitions ───────────────────────────────────────────────────────

# GP0-GP29 — fully muxed digital GPIOs
[[pins.groups]]
range        = { prefix = "GP", start = 0, end = 29 }
capabilities = [
    "gpio", "pwm",
    "i2c_sda", "i2c_scl",
    "spi_mosi", "spi_miso", "spi_sck", "spi_cs",
    "uart_tx", "uart_rx",
]

# GP30-GP47 — additional GPIOs (QFN-80 package)
[[pins.groups]]
range        = { prefix = "GP", start = 30, end = 47 }
capabilities = [
    "gpio", "pwm",
    "i2c_sda", "i2c_scl",
    "spi_mosi", "spi_miso", "spi_sck", "spi_cs",
    "uart_tx", "uart_rx",
]

# ADC pins (GP40-GP47 on RP2350)
[[pins.individual]]
name = "GP40"
add_capabilities = ["adc"]
special_function = "ADC Channel 0"
special_function_short = "ADC0"

[[pins.individual]]
name = "GP41"
add_capabilities = ["adc"]
special_function = "ADC Channel 1"
special_function_short = "ADC1"

[[pins.individual]]
name = "GP42"
add_capabilities = ["adc"]
special_function = "ADC Channel 2"
special_function_short = "ADC2"

[[pins.individual]]
name = "GP43"
add_capabilities = ["adc"]
special_function = "ADC Channel 3"
special_function_short = "ADC3"

[[pins.individual]]
name = "GP44"
add_capabilities = ["adc"]
special_function = "ADC Channel 4"
special_function_short = "ADC4"

[[pins.individual]]
name = "GP45"
add_capabilities = ["adc"]
special_function = "ADC Channel 5"
special_function_short = "ADC5"

[[pins.individual]]
name = "GP46"
add_capabilities = ["adc"]
special_function = "ADC Channel 6"
special_function_short = "ADC6"

[[pins.individual]]
name = "GP47"
add_capabilities = ["adc"]
special_function = "ADC Channel 7"
special_function_short = "ADC7"

# USB pins on RP2350 (dedicated, not GPIO-muxed)
# Documented here for reference but not in pin groups

# ── Peripherals ───────────────────────────────────────────────────────────

[[peripherals]]
name = "I2C"
instance = 0
pins = { sda = "configurable", scl = "configurable" }

[[peripherals]]
name = "I2C"
instance = 1
pins = { sda = "configurable", scl = "configurable" }

[[peripherals]]
name = "SPI"
instance = 0
pins = { mosi = "configurable", miso = "configurable", sck = "configurable", cs = "configurable" }

[[peripherals]]
name = "SPI"
instance = 1
pins = { mosi = "configurable", miso = "configurable", sck = "configurable", cs = "configurable" }

[[peripherals]]
name = "UART"
instance = 0
pins = { tx = "configurable", rx = "configurable" }

[[peripherals]]
name = "UART"
instance = 1
pins = { tx = "configurable", rx = "configurable" }

[[peripherals]]
name = "ADC"
instance = 0
pins = { ch0 = "GP40", ch1 = "GP41", ch2 = "GP42", ch3 = "GP43", ch4 = "GP44", ch5 = "GP45", ch6 = "GP46", ch7 = "GP47" }
