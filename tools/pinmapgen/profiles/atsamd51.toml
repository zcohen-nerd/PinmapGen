# ATSAMD51J19 — Microchip ATSAMD51J19A Cortex-M4F (Adafruit M4 boards)
# Canonical pin names: PA00–PA31, PB00–PB31

[profile]
schema_version = 1
name           = "atsamd51"
display_name = "ATSAMD51"
description  = "Microchip ATSAMD51J19A ARM Cortex-M4F 120 MHz (Adafruit Metro M4, Feather M4)"
family       = "sam"

# ── Normalization ──────────────────────────────────────────────────────────

[normalization]
canonical_prefix = "P"
allow_numeric    = false

# Canonical names are zero-padded two-digit (PA02, PB09), so pad outputs.
[[normalization.patterns]]
regex  = "GPIO([A-Z])(\\d+)"
output = "P{0}{1:02}"

# PA2 / PA02 → PA02
[[normalization.patterns]]
regex  = "P([A-Z])(\\d+)"
output = "P{0}{1:02}"

[[normalization.patterns]]
regex  = "([A-Z])(\\d+)"
output = "P{0}{1:02}"

[normalization.aliases]
SDA  = "PA12"
SCL  = "PA13"
SWCLK = "PA30"
SWDIO = "PA31"

# ── Pin definitions ───────────────────────────────────────────────────────

# Port A
[[pins.groups]]
names = [
    "PA00", "PA01", "PA02", "PA03", "PA04", "PA05", "PA06", "PA07",
    "PA08", "PA09", "PA10", "PA11", "PA12", "PA13", "PA14", "PA15",
    "PA16", "PA17", "PA18", "PA19", "PA20", "PA21", "PA22", "PA23",
    "PA24", "PA25", "PA27", "PA30", "PA31",
]
capabilities = [
    "gpio", "pwm",
    "i2c_sda", "i2c_scl",
    "spi_mosi", "spi_miso", "spi_sck", "spi_cs",
    "uart_tx", "uart_rx",
]

# Port B
[[pins.groups]]
names = [
    "PB00", "PB01", "PB02", "PB03", "PB04", "PB05", "PB06", "PB07",
    "PB08", "PB09", "PB10", "PB11", "PB12", "PB13", "PB14", "PB15",
    "PB16", "PB17", "PB22", "PB23", "PB30", "PB31",
]
capabilities = [
    "gpio", "pwm",
    "i2c_sda", "i2c_scl",
    "spi_mosi", "spi_miso", "spi_sck", "spi_cs",
    "uart_tx", "uart_rx",
]

